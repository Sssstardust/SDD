openapi: 3.0.3
info:
  title: tob-oa-office-demo API
  version: 1.0.0
paths:
  /api/v1/hr/employees:
    get:
      operationId: gEmployees
      summary: GET employees
      parameters:
        - name: pageNo
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: 分页页码
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: 分页大小
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: 关键字过滤条件
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: 业务结果码
                  message:
                    type: string
                    description: 结果说明
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                        description: 结果列表
                      total:
                        type: integer
                        format: int32
                        description: 总记录数
    post:
      operationId: pEmployees
      summary: POST employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requestId
                - operatorId
                - employeeName
                - departmentId
              properties:
                requestId:
                  type: string
                  description: 请求幂等标识或调用追踪标识
                operatorId:
                  type: string
                  description: 操作人标识
                employeeName:
                  type: string
                  description: 员工姓名
                departmentId:
                  type: string
                  description: 所属部门 ID
                status:
                  type: string
                  description: 员工状态
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: 业务结果码
                  message:
                    type: string
                    description: 结果说明
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 主记录 ID
                      status:
                        type: string
                        description: 处理后状态
